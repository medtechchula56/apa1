<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Portal | AHS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Prompt', sans-serif; 
      background: linear-gradient(135deg, #090514 0%, #1A0A33 50%, #0D0518 100%);
      color: #F8FAFC; 
      margin: 0; 
      min-height: 100vh;
      background-attachment: fixed;
    }
    .glass-panel {
      background: rgba(20, 10, 40, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(168, 85, 247, 0.2);
      box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
    }
    .premium-input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.3s ease;
    }
    .premium-input:focus {
      border-color: #A855F7;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
      outline: none;
    }
    /* Table Styling */
    tbody tr { transition: all 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05); }
    tbody tr:hover { background: rgba(168, 85, 247, 0.1); }
    
    .hidden-section { display: none !important; }
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-slate-200">

  <!-- หน้า Login -->
  <div id="login-section" class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
    <!-- วงกลมเรืองแสงเป็น Background -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-[100px]"></div>

    <div class="glass-panel p-10 rounded-3xl w-full max-w-md relative z-10 fade-in">
      <div class="text-center mb-10">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-purple-500/40">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-white tracking-wide">System Authorization</h2>
        <p class="text-purple-200/60 text-sm mt-1 font-light">กรุณาเข้าสู่ระบบด้วยรหัสนิสิต</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
        <div>
          <label class="block text-xs font-semibold tracking-wider text-purple-300 uppercase mb-2">Username</label>
          <input type="text" id="username" required class="w-full premium-input rounded-xl p-3.5" placeholder="รหัสนิสิต (เช่น 673XXXXX)">
        </div>
        <div>
          <label class="block text-xs font-semibold tracking-wider text-purple-300 uppercase mb-2">Password</label>
          <input type="password" id="password" required class="w-full premium-input rounded-xl p-3.5" placeholder="••••••••">
        </div>
        <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-4 rounded-xl hover:from-purple-500 hover:to-indigo-500 transition-all shadow-[0_0_20px_rgba(147,51,234,0.3)] mt-4">
          Authenticate
        </button>
      </form>
    </div>
  </div>

  <!-- หน้า Dashboard -->
  <div id="dashboard-section" class="hidden-section min-h-screen flex flex-col fade-in">
    <!-- Top Nav -->
    <nav class="glass-panel border-b border-white/10 px-8 py-5 flex justify-between items-center sticky top-0 z-40">
      <div>
        <h1 class="text-2xl font-bold text-white tracking-tight" id="dash-title">Command Center</h1>
        <p class="text-sm text-amber-300 font-medium mt-1" id="dash-subtitle">Loading...</p>
      </div>
      <div class="flex items-center gap-6">
        <div class="hidden md:flex items-center gap-2 text-sm text-purple-200">
          <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
          System Online
        </div>
        <button onclick="logout()" class="px-5 py-2 rounded-lg border border-red-500/50 text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium">
          Sign Out
        </button>
      </div>
    </nav>

    <main class="flex-grow p-6 md:p-8 max-w-7xl mx-auto w-full">
      
      <!-- ข้อมูลสถิติ (Stats) -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
        <div class="glass-panel p-6 rounded-2xl border-t-2 border-t-purple-500">
          <p class="text-xs text-purple-200/60 uppercase tracking-wider font-semibold mb-1">Total Applicants</p>
          <h3 class="text-3xl font-bold text-white" id="stat-total">0</h3>
        </div>
        <div class="glass-panel p-6 rounded-2xl border-t-2 border-t-amber-400">
          <p class="text-xs text-purple-200/60 uppercase tracking-wider font-semibold mb-1">In Queue (Pending)</p>
          <h3 class="text-3xl font-bold text-amber-300" id="stat-pending">0</h3>
        </div>
        <div class="glass-panel p-6 rounded-2xl border-t-2 border-t-emerald-400">
          <p class="text-xs text-purple-200/60 uppercase tracking-wider font-semibold mb-1">Accepted</p>
          <h3 class="text-3xl font-bold text-emerald-400" id="stat-accepted">0</h3>
        </div>
        <div class="glass-panel p-6 rounded-2xl border-t-2 border-t-rose-500">
          <p class="text-xs text-purple-200/60 uppercase tracking-wider font-semibold mb-1">Rejected / Passed</p>
          <h3 class="text-3xl font-bold text-rose-400" id="stat-rejected">0</h3>
        </div>
      </div>

      <!-- ตารางรายชื่อผู้สมัคร -->
      <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl border border-white/10">
        <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
          <h2 class="text-lg font-semibold text-white">รายชื่อผู้สมัครในความดูแล</h2>
          <button onclick="loadDashboardData()" class="text-purple-300 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          </button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm whitespace-nowrap">
            <thead class="bg-black/40 text-purple-200/80 uppercase text-xs tracking-wider">
              <tr>
                <th class="px-6 py-4 font-medium">รหัสนิสิต</th>
                <th class="px-6 py-4 font-medium">ชื่อ-สกุล (สาขา)</th>
                <th class="px-6 py-4 font-medium">เหตุผลในการสมัคร</th>
                <th class="px-6 py-4 font-medium">Contact</th>
                <th class="px-6 py-4 font-medium text-center">Action</th>
              </tr>
            </thead>
            <tbody id="table-body" class="divide-y divide-white/5">
              <!-- ข้อมูลจะถูกฉีดเข้าตรงนี้ -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzb6-O58UbtwJUtwKi8QUXQN-QVwDgVskiTuEhc2xoyEaxQOPhdGzuQIu8jME4KKgOm/exec'; 
    let currentUser = null;

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.innerText = 'Authenticating...';
      
      const payload = {
        action: 'login',
        payload: { username: document.getElementById('username').value, password: document.getElementById('password').value }
      };

      fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          currentUser = data.userData;
          document.getElementById('login-section').classList.add('hidden-section');
          document.getElementById('dashboard-section').classList.remove('hidden-section');
          
          document.getElementById('dash-title').innerText = currentUser.role === 'admin' ? 'Admin / Executive Board' : 'Department Head Portal';
          document.getElementById('dash-subtitle').innerText = currentUser.role === 'admin' ? 'ประธานโครงการ' : `${currentUser.project.toUpperCase()} • ${currentUser.dept}`;
          
          loadDashboardData();
        } else {
          alert('Access Denied: ' + data.message);
          btn.innerText = 'Authenticate';
        }
      });
    }

    function loadDashboardData() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-purple-300 animate-pulse">Scanning Database...</td></tr>';

      fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'getDashboardData', payload: { username: currentUser.username } }) })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          document.getElementById('stat-total').innerText = data.stats.total;
          document.getElementById('stat-pending').innerText = data.data.filter(d => d.status.includes('Pending')).length;
          document.getElementById('stat-accepted').innerText = data.stats.accepted;
          document.getElementById('stat-rejected').innerText = data.stats.rejected;

          tbody.innerHTML = '';
          if (data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-purple-200/50">ไม่มีผู้สมัครในคิวของคุณขณะนี้</td></tr>';
            return;
          }

          data.data.forEach(row => {
            let currentReason = row.status === 'Pending_Rank1' ? row.reason1 : (row.status === 'Pending_Rank2' ? row.reason2 : row.reason3);
            if(currentUser.role === 'admin') currentReason = row.reason1; 

            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="px-6 py-4 font-mono text-purple-200">${row.studentId}</td>
              <td class="px-6 py-4">
                <div class="font-medium text-white">${row.name}</div>
                <div class="text-xs text-purple-300">${row.branch}</div>
              </td>
              <td class="px-6 py-4 max-w-[200px] truncate text-purple-100/80" title="${currentReason}">${currentReason}</td>
              <td class="px-6 py-4 text-xs text-purple-200 space-y-1">
                <div>📞 ${row.phone}</div>
                <div class="text-emerald-400">💬 ${row.lineId}</div>
              </td>
              <td class="px-6 py-4 text-center">
                ${row.status.includes('Pending') ? `
                  <div class="flex gap-2 justify-center">
                    <button onclick="updateDecision('${row.sheetName}', ${row.rowNumber}, 'accept')" class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 px-3 py-1.5 rounded-lg hover:bg-emerald-500 hover:text-white transition">Accept</button>
                    <button onclick="updateDecision('${row.sheetName}', ${row.rowNumber}, 'reject')" class="bg-rose-500/20 text-rose-400 border border-rose-500/50 px-3 py-1.5 rounded-lg hover:bg-rose-500 hover:text-white transition">Reject</button>
                  </div>
                ` : `<span class="px-3 py-1 rounded-full text-xs font-medium ${row.status === 'Accepted' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-rose-500/20 text-rose-400'}">${row.status}</span>`}
              </td>
            `;
            tbody.appendChild(tr);
          });
        }
      });
    }

    function updateDecision(sheetName, rowNumber, actionType) {
      if (!confirm(`ยืนยันการ ${actionType === 'accept' ? 'Accept' : 'Reject'} ?`)) return;
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'updateStatus', payload: { sheetName, rowNumber, actionType } })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) loadDashboardData();
        else alert('Error: ' + data.message);
      });
    }

    function logout() {
      currentUser = null;
      document.getElementById('loginForm').reset();
      document.getElementById('dashboard-section').classList.add('hidden-section');
      document.getElementById('login-section').classList.remove('hidden-section');
    }
  </script>
</body>
</html>
